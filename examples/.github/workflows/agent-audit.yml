            // for (const finding of criticalFindings) {
            //   const ticket = await jira.create({
            //     project: 'SEC',
            //     summary: `Agent Audit: ${finding.title}`,
            //     description: `Security finding from Agent Audit\n\n${finding.description}`,
            //     severity: finding.severity,
            //     labels: ['agent-audit', 'automated']
            //   });
            //   console.log(`Created ticket: ${ticket.key}`);
            // }

      # Checkout repository if needed for JIRA integration
      - name: Checkout repository
        uses: actions/checkout@v4

  # Optional: Generate trend report
  generate-trend:
    name: Generate trend analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: agent-audit

    steps:
      - name: Download reports
        uses: actions/download-artifact@v3
        with:
          name: agent-audit-reports

      - name: Analyze trends
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('agent-audit-report.json', 'utf8'));

            console.log('📊 Daily Trend Analysis');
            console.log('=======================\n');

            const summary = report.summary || {};
            console.log(`Total Skills: ${summary.totalSkillsScanned}`);
            console.log(`Total Findings: ${summary.totalFindings}`);
            console.log(`Compliance Score: ${summary.complianceScore}/100\n`);

