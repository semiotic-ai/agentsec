# Environment-specific configurations:
# For production scanning:
#   - Set AGENT_AUDIT_POLICY_MAXSEVERITY=critical
#   - Set AGENT_AUDIT_POLICY_FAILONSEVERITY=true
#
# For development scanning:
#   - Set AGENT_AUDIT_POLICY_MAXSEVERITY=medium
#   - Set AGENT_AUDIT_SCANNING_LEVEL=2
#
# Required secrets:
#   - SLACK_WEBHOOK_URL (optional): Slack notifications
#   - DATADOG_API_KEY (optional): Datadog metrics
#   - JIRA_API_TOKEN (optional): JIRA integration
#   - GITHUB_TOKEN: Automatically available

