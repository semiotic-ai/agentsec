<svg viewBox="0 0 480 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .shield-fill { fill: none; stroke: #00d2b4; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .scan-line { stroke: #00d2b4; stroke-width: 1.6; stroke-linecap: round; }
      .wordmark { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; font-size: 48px; font-weight: 600; fill: #e6edf3; letter-spacing: -0.5px; }
    </style>
  </defs>

  <!-- Logo mark group (scaled and positioned) -->
  <g transform="translate(20, 10)">
    <!-- Main shield shape -->
    <path class="shield-fill" d="M 60 8 L 85 20 L 85 55 C 85 78 60 105 60 105 C 60 105 35 78 35 55 L 35 20 Z"/>

    <!-- Horizontal scan line 1 -->
    <line class="scan-line" x1="45" y1="40" x2="75" y2="40" opacity="0.9"/>

    <!-- Horizontal scan line 2 -->
    <line class="scan-line" x1="42" y1="52" x2="78" y2="52" opacity="0.7"/>

    <!-- Horizontal scan line 3 -->
    <line class="scan-line" x1="45" y1="64" x2="75" y2="64" opacity="0.9"/>

    <!-- Checkmark inside shield -->
    <g opacity="0.95">
      <path class="scan-line" d="M 50 60 L 57 68 L 70 48" fill="none"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text class="wordmark" x="165" y="88">AgentSec</text>
</svg>