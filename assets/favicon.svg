<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .shield-fill { fill: none; stroke: #00d2b4; stroke-width: 0.8; stroke-linecap: round; stroke-linejoin: round; }
      .scan-line { stroke: #00d2b4; stroke-width: 0.6; stroke-linecap: round; }
      .check { stroke: #00d2b4; stroke-width: 0.65; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>

  <!-- Main shield shape optimized for small size -->
  <path class="shield-fill" d="M 16 2 L 24 6 L 24 14.5 C 24 22 16 28 16 28 C 16 28 8 22 8 14.5 L 8 6 Z"/>

  <!-- Simplified scan lines -->
  <line class="scan-line" x1="11" y1="10.5" x2="21" y2="10.5" opacity="0.9"/>
  <line class="scan-line" x1="10" y1="14" x2="22" y2="14" opacity="0.7"/>

  <!-- Checkmark -->
  <g opacity="0.95">
    <path class="check" d="M 13 16 L 15 18 L 19 13"/>
  </g>
</svg>