<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .grid-line { stroke: #161b22; stroke-width: 1; }
      .shield-fill { fill: none; stroke: #00d2b4; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .scan-line { stroke: #00d2b4; stroke-width: 2.4; stroke-linecap: round; }
      .tagline { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; font-size: 32px; font-weight: 500; fill: #8b949e; letter-spacing: 0.2px; }
      .accent { stroke: #00d2b4; opacity: 0.15; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="1200" height="630"/>

  <!-- Subtle grid pattern background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path class="grid-line" d="M 40 0 L 0 0 0 40" fill="none"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.3"/>

  <!-- Accent circuit lines -->
  <line class="accent" x1="100" y1="50" x2="300" y2="80"/>
  <line class="accent" x1="1100" y1="550" x2="900" y2="580"/>
  <line class="accent" x1="1000" y1="100" x2="1100" y2="250"/>
  <line class="accent" x1="150" y1="500" x2="280" y2="400"/>

  <!-- Center logo group -->
  <g transform="translate(500, 140)">
    <!-- Main shield shape -->
    <path class="shield-fill" d="M 100 15 L 142 33 L 142 92 C 142 130 100 176 100 176 C 100 176 58 130 58 92 L 58 33 Z"/>

    <!-- Horizontal scan line 1 -->
    <line class="scan-line" x1="75" y1="67" x2="125" y2="67" opacity="0.9"/>

    <!-- Horizontal scan line 2 -->
    <line class="scan-line" x1="70" y1="87" x2="130" y2="87" opacity="0.7"/>

    <!-- Horizontal scan line 3 -->
    <line class="scan-line" x1="75" y1="107" x2="125" y2="107" opacity="0.9"/>

    <!-- Checkmark inside shield -->
    <g opacity="0.95">
      <path class="scan-line" d="M 83 100 L 95 113 L 117 80" fill="none"/>
    </g>
  </g>

  <!-- Tagline below logo -->
  <text class="tagline" x="600" y="420" text-anchor="middle">Trust Every Skill Your Agents Run</text>

  <!-- Bottom accent line -->
  <line x1="300" y1="600" x2="900" y2="600" stroke="#00d2b4" stroke-width="2" opacity="0.3"/>
</svg>