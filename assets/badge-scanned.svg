<svg viewBox="0 0 280 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .pill-bg { fill: #0d1117; stroke: #8b949e; stroke-width: 1.5; }
      .shield-badge { fill: none; stroke: #8b949e; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
      .scan-badge { stroke: #8b949e; stroke-width: 0.8; stroke-linecap: round; }
      .badge-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif; font-size: 14px; font-weight: 600; fill: #8b949e; letter-spacing: 0.3px; }
    </style>
  </defs>

  <!-- Pill background -->
  <rect class="pill-bg" x="2" y="2" width="276" height="76" rx="38" ry="38"/>

  <!-- Icon group: small shield with scan lines -->
  <g transform="translate(18, 20)">
    <!-- Shield -->
    <path class="shield-badge" d="M 20 2 L 28 6 L 28 15 C 28 21 20 26 20 26 C 20 26 12 21 12 15 L 12 6 Z"/>
    <!-- Scan lines -->
    <line class="scan-badge" x1="15" y1="12" x2="25" y2="12" opacity="0.85"/>
    <line class="scan-badge" x1="14" y1="16" x2="26" y2="16" opacity="0.65"/>
    <line class="scan-badge" x1="15" y1="20" x2="25" y2="20" opacity="0.85"/>
  </g>

  <!-- Badge text -->
  <text class="badge-text" x="70" y="52">Scanned by Agent Audit</text>
</svg>