name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.0)"
        required: true
        type: string
      dry-run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      version: ${{ steps.cli_version.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Setup Node.js (for npm publish)
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Read CLI version from package.json
        id: cli_version
        run: echo "value=$(jq -r .version packages/cli/package.json)" >> "$GITHUB_OUTPUT"

      - name: Verify version stamps are in sync
        run: bun run check:versions

      - name: Build all packages
        run: bun run build

      - name: Test
        run: bun run test

      - name: Publish CLI to npm
        if: ${{ !inputs.dry-run }}
        run: |
          cd packages/cli
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI to npm (dry run)
        if: ${{ inputs.dry-run }}
        run: |
          cd packages/cli
          npm publish --dry-run

  clawhub:
    name: Publish skill to ClawHub
    needs: release
    permissions:
      contents: read
      id-token: write
    uses: openclaw/clawhub/.github/workflows/package-publish.yml@main
    with:
      dry_run: ${{ inputs.dry-run || false }}
      # ClawHub's reusable workflow does not auto-derive the version from a tag —
      # we must pass it explicitly. Read it from packages/cli/package.json (the
      # canonical stamp) so the same value works for both tag-push and dispatch.
      version: ${{ needs.release.outputs.version }}
    secrets:
      clawhub_token: ${{ secrets.CLAWHUB_API_TOKEN }}

  skillssh:
    name: Publish skill to skills.sh
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Verify skill is discoverable
        run: |
          set -euo pipefail
          output=$(npx -y skills@latest add semiotic-ai/agentsec --list 2>&1)
          echo "$output"
          echo "$output" | grep -qw agentsec \
            || (echo "::error::Skill 'agentsec' not discoverable in semiotic-ai/agentsec" && exit 1)

      - name: Install skill via skills CLI (registers/refreshes skills.sh listing)
        if: ${{ !inputs.dry-run }}
        run: |
          set -euo pipefail
          npx -y skills@latest add semiotic-ai/agentsec \
            --skill agentsec \
            --agent claude-code \
            --global \
            --copy \
            --yes
